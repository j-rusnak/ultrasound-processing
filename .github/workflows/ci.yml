name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest --basetemp .pytest_tmp

      - name: Smoke test CLI configs
        run: |
          python scripts/train.py --config configs/experiments/unet_fm_baq.yaml --dry-run
          python scripts/train.py --config configs/experiments/attention_unet_fm_baq.yaml --dry-run
          python scripts/train.py --config configs/experiments/umb_region_grid/unet_ffm_a.yaml --dry-run
          python scripts/evaluate.py --config configs/experiments/unet_fm_baq.yaml --dry-run
